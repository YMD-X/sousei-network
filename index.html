<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SOUSEI NETWORK</title>
  <meta name="description" content="全国曹洞宗青年会・加盟曹洞宗青年会 WEB & SNS LINK PORTAL の静的プロトタイプです。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sousei-page">
    <header class="sousei-hero" id="sousei-top" aria-labelledby="sousei-title">
      <div class="sousei-grid-bg" aria-hidden="true"></div>
      <div class="sousei-hero__inner">
        <a class="sousei-logo" href="#" aria-label="SOUSEI NETWORK トップ">
          <img src="assets/logo.svg" alt="SOUSEI NETWORK" id="sousei-title">
          <span class="sousei-logo__kana" aria-hidden="true">ソウセイネットワーク</span>
        </a>
        <p class="sousei-lead">全国曹洞宗青年会 / 加盟曹洞宗青年会 WEB &amp; SNS LINK PORTAL</p>
      </div>
      <div class="sousei-voxel" aria-hidden="true">
        <span class="sousei-voxel__island sousei-voxel__island--left"><i></i></span>
        <span class="sousei-voxel__person sousei-voxel__person--left"></span>
        <span class="sousei-voxel__island sousei-voxel__island--right"><i></i></span>
        <span class="sousei-voxel__person sousei-voxel__person--right"></span>
      </div>
    </header>

    <main class="sousei-main">
      <nav class="sousei-tabs" aria-label="サービス別リンク">
        <div class="sousei-tabs__inner" id="sousei-tabs" role="tablist"></div>
      </nav>

      <section class="sousei-results" id="sousei-results" aria-live="polite">
        <p class="sousei-count" id="sousei-count"></p>
        <div class="sousei-card-grid" id="sousei-card-grid"></div>
      </section>
    </main>

    <footer class="sousei-footer">
      <div class="sousei-grid-bg" aria-hidden="true"></div>
      <div class="sousei-footer__brand">
        <a class="sousei-footer__logo" href="#sousei-top" aria-label="ヘッダーへ戻る">
          <img src="assets/logo.svg" alt="SOUSEI NETWORK">
        </a>
        <span class="sousei-duck" aria-hidden="true"></span>
      </div>
    </footer>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
